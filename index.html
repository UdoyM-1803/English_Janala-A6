<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Window</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <!-- Navbar Section ------------------ -->
    <header class="w-full bg-[#C6BDBD] sticky top-0">
        <nav class="w-11/12 mx-auto py-5 flex justify-between items-center">
            <div class="flex items-center">
                <h2 class="font-semibold md:text-xl">English</h2>
                <div>
                    <img src="assets/logo.png" alt="">
                </div>
                <h2 class="font-semibold md:text-xl">জানালা</h2>
            </div>
            <div class="flex gap-2 items-center">
                <!-- To make the icon turn white on hover like the text 
                 group → allows child elements to react to parent hover
                group-hover:* → applies style when button is hovered
                invert + brightness-0 → turns the icon into white-->

                <!-- 1st Button -->
                <button class="btn btn-outline border-1 btn-primary border-2 group">
                    <span><img src="assets/fa-circle-question.png"
                            class="transition group-hover:invert group-hover:brightness-0"></span>
                    FAQ
                </button>

                <!-- 2nd Button -->
                <button class="btn btn-outline btn-primary border-2 group">
                    <img src="assets/fa-book-open.png" class="transition group-hover:invert group-hover:brightness-0">
                    Learn
                </button>

                <!-- 3rd Button -->
                <button class="btn btn-outline border-1 btn-primary border-2 group">
                    <span><img src="assets/fa-arrow-right-from-bracket.png"
                            class="transition group-hover:invert group-hover:brightness-0"></span>
                    Logout
                </button>
            </div>
        </nav>
    </header>

    <!-- The Banner Part ************************** -->
    <section class="w-11/12 mx-auto flex flex-col-reverse md:flex-row md:justify-between md:items-center py-5">
        <div class="md:w-1/2 mx-auto">
            <h1 class="font-bold text-5xl"><span class="text-[#00BCFF]">English</span> is Easy!!</h1>
            <p class="font-medium my-5">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে
                চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>
            <div class="flex flex-col gap-5">
                <input type="text" class="input" placeholder="Enter your Name" />
        
                <input type="password" class="input" placeholder="Enter Login Code(123456)" />
            </div>
                
            <button class="btn btn-primary my-6">Get Started</button>
        </div>
        <img class="md:w-1/2 mx-auto" src="assets/hero-student.png" alt="">
    </section>
</body>

</html>
